services:
  db:
    image: postgres:16
    container_name: investment_portal_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: investment_portal
    ports:
      - "5432:5432"
    volumes:
      - investment_portal_db_data:/var/lib/postgresql/data

volumes:
  investment_portal_db_data:
